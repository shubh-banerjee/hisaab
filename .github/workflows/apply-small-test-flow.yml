name: Apply small test flow

on:
  push:
    branches:
      - main
    paths:
      - scripts/implement-small-test-flow.js
      - .github/workflows/apply-small-test-flow.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply product changes
        run: node scripts/implement-small-test-flow.js
      - name: Validate JavaScript
        run: |
          node --check public/script.js
          node --check server.js
      - name: Run tests
        run: npm test
      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/index.html public/script.js public/style.css server.js
          git commit -m "Implement small test setup flow"
          git push origin main
