name: Apply product UI fixes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Apply stable product changes
        run: |
          node scripts/rebuild-splash-implementation.js
          node scripts/rebuild-home-screen.js
          node scripts/rebuild-demo-flow.js
          node scripts/polish-demo-lesson-shell.js
          node scripts/finalize-demo-close-icon.js
          node scripts/implement-small-test-flow.js
      - name: Validate JavaScript
        run: |
          node --check public/script.js
          node --check server.js
          node --check scripts/rebuild-splash-implementation.js
          node --check scripts/rebuild-home-screen.js
          node --check scripts/rebuild-demo-flow.js
          node --check scripts/polish-demo-lesson-shell.js
          node --check scripts/finalize-demo-close-icon.js
          node --check scripts/implement-small-test-flow.js
      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply product UI fixes"
          git push origin main
