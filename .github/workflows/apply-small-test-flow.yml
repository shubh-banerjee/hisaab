name: Apply product UI fixes

on:
  push:
    branches:
      - main
    paths:
      - scripts/rebuild-splash-implementation.js
      - scripts/rebuild-home-screen.js
      - scripts/implement-small-test-flow.js
      - .github/workflows/apply-small-test-flow.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Apply product changes
        run: |
          node scripts/rebuild-splash-implementation.js
          node scripts/rebuild-home-screen.js
          node scripts/implement-small-test-flow.js
      - name: Validate JavaScript
        run: |
          node --check public/script.js
          node --check server.js
          node --check scripts/rebuild-splash-implementation.js
          node --check scripts/rebuild-home-screen.js
          node --check scripts/implement-small-test-flow.js
      - name: Run tests
        run: npm test
      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply product UI fixes"
          git push origin main
